{#
REQUIRES:
- field
- errors
- schema_error
- field_code
- field_value
#}
<select
  id="{{ field.code }}"
  name="{{ field.code }}"
  class="form-control"
  {% if disable_submit %}disabled aria-disabled="true"{% endif %}
>
  <option value=""></option>
  {% for opt in field.get_choices_list %}
    <option value="{{ opt }}" {% if value|stringformat:"s" == opt|stringformat:"s" %}selected{% endif %}>{{ opt }}</option>
  {% endfor %}
</select>
