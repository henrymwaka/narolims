{#
REQUIRES:
- field
- errors
- schema_error
- field_code
- field_value
#}
<div class="form-check">
  <input
    class="form-check-input"
    type="checkbox"
    id="{{ field.code }}"
    name="{{ field.code }}"
    value="1"
    {% if value %}checked{% endif %}
    {% if disable_submit %}disabled aria-disabled="true"{% endif %}
  />
  <label class="form-check-label" for="{{ field.code }}">Yes</label>
</div>
